<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>My Friend AI Sale Sunday - Island App</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19;
            user-select: none;
            -webkit-user-select: none;
        }
        
        /* พื้นที่แอปพลิเคชันหลัก */
        #canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
            cursor: grab;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #canvas-container:active {
            cursor: grabbing;
        }
        
        /* แผนภูมิเกาะเสมือนจริง (ปรับสัดส่วนเป็น 720x720 ตามไฟล์วิดีโอหน้างานจริง) */
        #map-wrapper {
            position: absolute;
            width: 720px;
            height: 720px;
            transform-origin: center center;
            transition: transform 0.1s ease-out;
            will-change: transform;
        }
        
        /* วิดีโอพื้นหลังเคลื่อนไหวแบบจัตุรัส */
        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            box-shadow: 0 0 50px rgba(0,0,0,0.6);
            pointer-events: none;
            border-radius: 16px;
        }
        
        /* ระบบหมุดลอยล็อกพิกัด */
        .shop-marker {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 3px solid #ffffff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            animation: pulse 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 11px;
            font-weight: bold;
            z-index: 10;
            transition: transform 0.2s ease;
        }
        .shop-marker:hover {
            transform: translate(-50%, -50%) scale(1.2);
        }
        
        @keyframes pulse {
            0 { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); }
            70 { box-shadow: 0 0 0 12px rgba(255, 255, 255, 0); }
            100 { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        /* รหัสสีแบ่งโซนการทำงานระดับสากล */
        .shop-marker.zone1 { background-color: #ff3b30; box-shadow: 0 0 15px #ff3b30; } 
        .shop-marker.zone2 { background-color: #ffcc00; color: #000; border-color: #000; box-shadow: 0 0 25px #ffcc00; border-radius: 8px; } 
        .shop-marker.zone3 { background-color: #34c759; box-shadow: 0 0 15px #34c759; } 

        /* หน้าต่างข้อมูลกระจกฝ้าแบบ Pop-up ดึงขึ้นจากด้านล่าง */
        #info-panel {
            position: fixed;
            bottom: -100%;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 460px;
            background: rgba(15, 22, 38, 0.96);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px 24px 0 0;
            padding: 25px;
            color: #ffffff;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            box-shadow: 0 -15px 35px rgba(0,0,0,0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }
        #info-panel.active { bottom: 0; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #8e8e93; transition: color 0.2s; }
        .close-btn:hover { color: white; }
        
        #panel-title { font-size: 20px; font-weight: bold; margin-bottom: 12px; color: #ffcc00; line-height: 1.3; }
        #panel-desc { font-size: 14.5px; color: #d1d1d6; margin-bottom: 20px; line-height: 1.5; }
        #panel-img { width: 100%; height: auto; max-height: 210px; object-fit: cover; border-radius: 12px; margin-bottom: 15px; display: none; border: 1px solid rgba(255,255,255,0.2); }
        
        /* ปุ่มภายนอกติดต่อตรงแบบไม่ผ่านตัวกลางเพื่อความโปร่งใส */
        .action-btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #34c759, #248a3d);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(52, 199, 89, 0.3);
            transition: opacity 0.2s;
        }
        .action-btn:hover { opacity: 0.9; }
        
        /* ปุ่มกดสั่งงานเสริมภายนอก */
        #controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            gap: 8px;
        }
        .ctrl-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: background 0.2s;
        }
        .ctrl-btn:hover { background: rgba(255,255,255,0.3); }
    </style>
</head>
<body>

    <div id="controls">
        <button class="ctrl-btn" onclick="zoom(0.2)">ซูมเข้า +</button>
        <button class="ctrl-btn" onclick="zoom(-0.2)">ซูมออก -</button>
        <button class="ctrl-btn" onclick="resetZoom()">รีเซ็ตฉาก</button>
    </div>

    <div id="canvas-container">
        <div id="map-wrapper">
            <video id="bg-video" autoplay loop muted playsinline>
                <source src="my friend AI.mp4" type="video/mp4">
            </video>
            <div id="marker-layer"></div>
        </div>
    </div>

    <div id="info-panel">
        <span class="close-btn" onclick="closePanel()">&times;</span>
        <div id="panel-title">ระบุชื่อตำแหน่ง</div>
        <img id="panel-img" src="" alt="รูปภาพประจำจุดข้อมูล">
        <div id="panel-desc">ระบุคำอธิบายเชิงลึกหน้างาน</div>
        <a id="panel-link" href="#" target="_blank" class="action-btn">ติดต่อตรงภายนอก</a>
    </div>

    <script>
        // ฐานข้อมูลหมุดพิกัดตามสัดส่วนจอจัตุรัสใหม่
        const shopDatabase = [
            { id: "โซน 1", name: "โซน 1: ตลาดร้านค้าชุมชนเสรี", type: "zone1", x: 80, y: 55, desc: "พื้นที่เปิดให้พ่อค้าแม่ค้าเข้ามาค้าขาย วางของขายออนไลน์ได้อย่างอิสระชิลๆ", img: "", link: "https://line.me" },
            { id: "โซน 2", name: "โซน 2: พื้นที่ป้ายโฆษณาใหญ่ (ธุรกิจของเรา)", type: "zone2", x: 42, y: 53, desc: "ป้ายโฆษณาพรีเมียมขนาดใหญ่สำหรับสร้างรายได้หลัก ผูกลิงก์ติดต่อตรงภายนอกไม่ผ่านแอป", img: "https://images.unsplash.com/photo-1542744094-3a31f103e35f?auto=format&fit=crop&w=400&q=80", link: "https://line.me" },
            { id: "โซน 3", name: "โซน 3: แหล่งท่องเที่ยววิวธรรมชาติสวยงาม", type: "zone3", x: 15, y: 65, desc: "จุดปักป้ายแปะภาพวิวธรรมชาติสวย ๆ รอบเกาะ ให้คนซูมดูและเสพเสพบรรยากาศพัดเคลื่อนไหวได้ชิลๆ", img: "", link: "https://google.com" }
        ];

        const markerLayer = document.getElementById('marker-layer');
        const infoPanel = document.getElementById('info-panel');
        const mapWrapper = document.getElementById('map-wrapper');
        const canvasContainer = document.getElementById('canvas-container');
        const panelImg = document.getElementById('panel-img');

        let currentScale = 1;
        let isDragging = false;
        let startX, startY;
        let translateX = 0, translateY = 0;

        function renderMarkers() {
            markerLayer.innerHTML = '';
            shopDatabase.forEach(shop => {
                const marker = document.createElement('div');
                marker.className = `shop-marker ${shop.type}`;
                marker.style.left = `${shop.x}%`;
                marker.style.top = `${shop.y}%`;
                marker.innerText = shop.id;
                
                marker.onclick = (e) => {
                    e.stopPropagation();
                    document.getElementById('panel-title').innerText = shop.name;
                    document.getElementById('panel-desc').innerText = shop.desc;
                    document.getElementById('panel-link').href = shop.link;
                    
                    if(shop.img && shop.img !== "") {
                        panelImg.src = shop.img;
                        panelImg.style.display = "block";
                    } else {
                        panelImg.style.display = "none";
                    }
                    infoPanel.classList.add('active');
                };
                markerLayer.appendChild(marker);
            });
        }

        function closePanel() { infoPanel.classList.remove('active'); }

        function updateTransform() {
            mapWrapper.style.transform = `translate(${translateX}px, ${translateY}px) scale(${currentScale})`;
        }

        function zoom(amount) {
            currentScale = Math.min(Math.max(0.5, currentScale + amount), 4);
            updateTransform();
        }

        function resetZoom() {
            currentScale = 1;
            translateX = 0;
            translateY = 0;
            updateTransform();
        }

        function dragStart(e) {
            if (e.target.classList.contains('ctrl-btn') || e.target.closest('#info-panel')) return;
            isDragging = true;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            startX = clientX - translateX;
            startY = clientY - translateY;
        }

        function dragMove(e) {
            if (!isDragging) return;
            e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            translateX = clientX - startX;
            translateY = clientY - startY;
            updateTransform();
        }

        function dragEnd() {
            isDragging = false;
        }

        canvasContainer.addEventListener('mousedown', dragStart);
        window.addEventListener('mousemove', dragMove);
        window.addEventListener('mouseup', dragEnd);

        canvasContainer.addEventListener('touchstart', dragStart, { passive: false });
        window.addEventListener('touchmove', dragMove, { passive: false });
        window.addEventListener('touchend', dragEnd);

        window.onload = () => { 
            renderMarkers(); 
            updateTransform();
        };
    </script>
</body>
</html>
